# ─────────────────────────────────────────────────────────────────────────────
# Component Contract System — Project Config
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Copy .env.example to .env and fill in your values.
# 2. Edit this file to match your project (file key, codebase path, etc.)
# 3. Never commit real tokens to version control.
# See agent.manifest.yml for the full agent operating guide.
# ─────────────────────────────────────────────────────────────────────────────


# ─── Figma ───────────────────────────────────────────────────────────────────

figma:
  # URL of the local Figma Dev Mode MCP server.
  # The Figma desktop app must be running with the target file open.
  mcp_server_url: ${FIGMA_MCP_URL:-http://127.0.0.1:3845/mcp}

  # Base URL for the Figma REST API. Used in headless/CI environments.
  # Does not require the Figma desktop app.
  api_base_url: https://api.figma.com/v1

  # Your Figma personal access token.
  # Set this via FIGMA_PAT in .env — never write it here directly.
  personal_access_token: ${FIGMA_PAT}

  # Component-to-Figma mapping. Each entry has a name that matches a directory
  # under components/. Agents resolve Figma sources by name — no file reads needed.
  registry: ./figma-registry.yml


# ─── Codebase ────────────────────────────────────────────────────────────────

codebase:
  # Absolute or relative path to the target codebase where components are written.
  # Set CODEBASE_PATH in .env to point to your local checkout.
  path: ${CODEBASE_PATH}

  # Framework used in the target codebase.
  # Options: react, vue, svelte, angular, web-components, other
  # Leave blank to let the agent detect it from the codebase.
  framework: ~

  # Styling system used in the target codebase.
  # Options: tailwind, css-modules, styled-components, sass, css-in-js, other
  # Leave blank to let the agent detect it from the codebase.
  styling_system: ~

  # Path (relative to codebase.path) where new component files are created.
  # Leave blank to let the agent follow existing codebase conventions.
  components_subdir: ~


# ─── Output ──────────────────────────────────────────────────────────────────

output:
  # Root directory where individual component contract folders are created.
  # Each component gets its own subdirectory: components/<name>/contract.json
  components_dir: ./components

  # Which contract formats to generate. Options: json, yml
  formats:
    - json
    - yml

  # Path to the JSON Schema used to validate contract files.
  schema_path: ./schema.json


# ─── Agent behavior ──────────────────────────────────────────────────────────

agent:
  # Include states that exist behaviorally but have no Figma variant
  # (e.g., focused, pressed). Set figma_variant to null for these.
  include_states_without_figma_variant: true

  # Value to use for figma_variant when a state has no Figma counterpart.
  default_missing_figma_variant_value: null

  # Always add a `focused` state even if Figma does not define one.
  always_include_focused_state: true

  # Always add a `pressed` state for components with click interactions.
  always_include_pressed_state: true

  # Minimum number of scenarios required in a valid contract.
  minimum_scenarios: 4


# ─── Documentation ───────────────────────────────────────────────────────────

docs:
  # Agent manifest — read this first on a fresh clone.
  manifest: ./agent.manifest.yml

  # Path to the agent guide. Agents read this for MCP protocol details.
  agents_guide: ./docs/agents.md

  # Path to the glossary. Referenced when filling in contract keys.
  glossary: ./docs/glossary.md

  # Path to the limitations guide. Checked before writing any value.
  limitations: ./docs/limitations.md

  # Path to the requirements checklist. Used to validate a finished contract.
  requirements: ./docs/requirements.md
